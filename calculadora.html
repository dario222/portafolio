```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora</title>

<style>

body{
font-family: Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
margin:0;
}

.calculadora{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
height:40px;
font-size:20px;
margin-bottom:10px;
text-align:right;
padding:5px;
box-sizing:border-box;
}

button{
width:50px;
height:50px;
margin:5px;
font-size:18px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>
</head>

<body>

<div class="calculadora">

<input type="text" id="pantalla" readonly>

<br>

<button onclick="agregar('1')">1</button>
<button onclick="agregar('2')">2</button>
<button onclick="agregar('3')">3</button>
<button onclick="agregar('+')">+</button>

<br>

<button onclick="agregar('4')">4</button>
<button onclick="agregar('5')">5</button>
<button onclick="agregar('6')">6</button>
<button onclick="agregar('-')">-</button>

<br>

<button onclick="agregar('7')">7</button>
<button onclick="agregar('8')">8</button>
<button onclick="agregar('9')">9</button>
<button onclick="agregar('*')">*</button>

<br>

<button onclick="agregar('0')">0</button>
<button onclick="calcular()">=</button>
<button onclick="borrar()">C</button>
<button onclick="agregar('/')">/</button>

</div>

<script>

function agregar(valor){
document.getElementById("pantalla").value += valor
}

function calcular(){
try{
let resultado = eval(document.getElementById("pantalla").value)
document.getElementById("pantalla").value = resultado
}
catch{
document.getElementById("pantalla").value = "Error"
}
}

function borrar(){
document.getElementById("pantalla").value = ""
}

</script>

</body>
</html>
```
